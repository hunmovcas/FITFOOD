<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite — Đặt hàng</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/customer.css">
</head>

<body>
    <nav class="customer-nav">
        <div class="customer-nav-inner">
            <div class="nav-brand"><span class="brand-leaf">🌿</span><span class="brand-text">GreenBite</span></div>
            <div class="nav-right">
                <div class="user-avatar-btn" id="avatarBtn"></div>
            </div>
        </div>
    </nav>
    <main class="customer-main" style="max-width:900px">
        <h2 style="font-family:var(--font-display);margin-bottom:1.5rem">📦 Xác nhận đặt hàng</h2>

        <!-- Steps -->
        <div style="display:flex;align-items:center;gap:0;margin-bottom:2rem">
            <div class="step-dot active" id="s1">1. Thông tin</div>
            <div class="step-line"></div>
            <div class="step-dot" id="s2">2. Thanh toán</div>
            <div class="step-line"></div>
            <div class="step-dot" id="s3">3. Xác nhận</div>
        </div>
        <style>
            .step-dot {
                padding: .5rem 1.25rem;
                border-radius: 99px;
                font-size: .82rem;
                font-weight: 700;
                background: var(--gray-100);
                color: var(--gray-600)
            }

            .step-dot.active {
                background: var(--green-600);
                color: #fff
            }

            .step-dot.done {
                background: var(--green-100);
                color: var(--green-700)
            }

            .step-line {
                flex: 1;
                height: 2px;
                background: var(--gray-100)
            }
        </style>

        <div class="grid-2" style="grid-template-columns:1fr 340px;align-items:start">
            <div id="step1">
                <div class="card mb-2">
                    <div class="card-header"><span class="section-title">📍 Địa chỉ giao hàng</span></div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>Họ và tên</label>
                            <input class="form-control" id="cName" placeholder="Nguyễn Văn A">
                        </div>
                        <div class="form-group">
                            <label>Số điện thoại</label>
                            <input class="form-control" id="cPhone" placeholder="0901234567" type="tel">
                        </div>
                        <div class="form-group">
                            <label>Địa chỉ nhận hàng</label>
                            <input class="form-control" id="cAddr" placeholder="Số nhà, tên đường, phường/xã...">
                        </div>
                        <div class="form-group">
                            <label>Ghi chú giao hàng</label>
                            <input class="form-control" id="cNote" placeholder="VD: Gọi trước khi giao, để ở bảo vệ...">
                        </div>
                        <div class="form-group">
                            <label>Khung giờ giao hàng</label>
                            <select class="form-control" id="cTime">
                                <option>Sớm nhất có thể (30-45 phút)</option>
                                <option>11:00 - 12:00</option>
                                <option>12:00 - 13:00</option>
                                <option>17:00 - 18:00</option>
                                <option>18:00 - 19:00</option>
                                <option>19:00 - 20:00</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="card mb-2">
                    <div class="card-header"><span class="section-title">💳 Phương thức thanh toán</span></div>
                    <div class="card-body">
                        <div style="display:flex;flex-direction:column;gap:.75rem">
                            <label class="pay-option"
                                style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid var(--green-500);border-radius:var(--radius-md);cursor:pointer;background:var(--green-50)">
                                <input type="radio" name="payment" value="online" checked
                                    style="accent-color:var(--green-600)">
                                <span style="font-size:1.5rem">💳</span>
                                <div>
                                    <div style="font-weight:600">Thanh toán online</div>
                                    <div class="text-sm text-muted">Chuyển khoản ngân hàng / Ví điện tử</div>
                                </div>
                            </label>
                            <label class="pay-option"
                                style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid #e2e8f0;border-radius:var(--radius-md);cursor:pointer">
                                <input type="radio" name="payment" value="cash" style="accent-color:var(--green-600)">
                                <span style="font-size:1.5rem">💵</span>
                                <div>
                                    <div style="font-weight:600">Tiền mặt khi nhận hàng</div>
                                    <div class="text-sm text-muted">COD - Thanh toán khi shipper giao tới</div>
                                </div>
                            </label>
                            <label class="pay-option"
                                style="display:flex;align-items:center;gap:1rem;padding:1rem;border:2px solid #e2e8f0;border-radius:var(--radius-md);cursor:pointer">
                                <input type="radio" name="payment" value="points" style="accent-color:var(--green-600)">
                                <span style="font-size:1.5rem">⭐</span>
                                <div>
                                    <div style="font-weight:600">Điểm thưởng</div>
                                    <div class="text-sm text-muted">Dùng 1250 điểm (≈ 125,000đ)</div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary btn-lg btn-block" onclick="placeOrder()">✅ Xác nhận đặt hàng</button>
            </div>

            <!-- Order summary -->
            <div class="card" style="position:sticky;top:80px">
                <div class="card-header"><span class="section-title">📋 Đơn hàng</span></div>
                <div class="card-body" id="checkoutItems"></div>
            </div>
        </div>
    </main>

    <!-- Success modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal" style="max-width:480px">
            <div class="modal-body" style="text-align:center;padding:3rem">
                <div style="font-size:5rem;margin-bottom:1rem;animation:fadeIn .5s ease">🎉</div>
                <h2 style="font-family:var(--font-display);color:var(--green-900);margin-bottom:.5rem">Đặt hàng thành
                    công!</h2>
                <p class="text-muted mb-2">Đơn hàng của bạn đã được xác nhận và đang được chế biến.</p>
                <div class="badge badge-green mb-3" style="font-size:.9rem;padding:.5rem 1.25rem" id="orderNum"></div>
                <div
                    style="background:var(--green-50);border-radius:var(--radius-md);padding:1rem;margin-bottom:1.5rem;text-align:left">
                    <div style="font-size:.82rem;color:var(--gray-600);margin-bottom:.25rem">Thời gian dự kiến</div>
                    <div style="font-weight:700;color:var(--green-800)">⏱ 35-45 phút</div>
                </div>
                <div style="display:flex;flex-direction:column;gap:.75rem">
                    <button class="btn btn-primary btn-block" onclick="window.location.href='orders.html'">📍 Theo dõi
                        đơn hàng</button>
                    <button class="btn btn-secondary btn-block" onclick="window.location.href='menu.html'">Đặt thêm
                        món</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../assets/js/auth.js"></script>
    <script>
        const user = requireAuth(['customer']);
        if (user) {
            document.getElementById('avatarBtn').textContent = user.avatar;
            document.getElementById('cName').value = user.name;
        }

        function renderCheckout() {
            const cart = getCart();
            const sub = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
            const ship = 25000;
            document.getElementById('checkoutItems').innerHTML = `
    ${cart.map(i => `<div style="display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid #f5f5f2;font-size:.88rem">
      <span>${i.emoji} ${i.name} ×${i.qty || 1}</span>
      <span style="font-weight:600;color:var(--green-700)">${formatCurrency(i.price * (i.qty || 1))}</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;margin-top:.75rem;font-size:.88rem"><span>Tạm tính</span><span>${formatCurrency(sub)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:.88rem"><span>Phí ship</span><span>${formatCurrency(ship)}</span></div>
    <hr class="divider">
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem"><span>Tổng</span><span style="color:var(--green-700)">${formatCurrency(sub + ship)}</span></div>
  `;
        }

        function placeOrder() {
            const name = document.getElementById('cName').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            const addr = document.getElementById('cAddr').value.trim();
            if (!name || !phone || !addr) { showToast('Vui lòng điền đầy đủ thông tin giao hàng', 'warning'); return; }
            const orderNum = '#' + (2400 + Math.floor(Math.random() * 100));
            document.getElementById('orderNum').textContent = `Mã đơn: ${orderNum}`;
            saveCart([]);
            updateCartCount();
            openModal('successModal');
        }

        renderCheckout();
        updateCartCount();
    </script>
</body>

</html>
