<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite — Thực đơn</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/customer.css">
</head>

<body>
    <nav class="customer-nav">
        <div class="customer-nav-inner">
            <div class="nav-brand"><span class="brand-leaf">🌿</span><span class="brand-text">GreenBite</span></div>
            <div class="nav-links">
                <a class="nav-link" href="home.html">Trang chủ</a>
                <a class="nav-link active" href="menu.html">Thực đơn</a>
                <a class="nav-link" href="subscription.html">Gói ăn</a>
                <a class="nav-link" href="orders.html">Đơn hàng</a>
            </div>
            <div class="nav-right">
                <button class="cart-btn" onclick="toggleCart()">🛒 Giỏ hàng <span class="cart-count">0</span></button>
                <div class="user-avatar-btn" id="avatarBtn" onclick="window.location.href='profile.html'"></div>
            </div>
        </div>
    </nav>

    <main class="customer-main">
        <div style="margin-bottom:1.5rem">
            <h1 style="font-family:var(--font-display);font-size:2rem;color:var(--green-900)">🍽 Thực đơn hôm nay</h1>
            <p class="text-muted text-sm">Tất cả món được chế biến mỗi ngày từ nguyên liệu tươi theo mùa</p>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar">
            <div class="filter-search">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Tìm kiếm món ăn..." oninput="filterMenu()">
            </div>
            <div class="filter-tags" id="filterTags">
                <span class="filter-tag active" data-cat="all" onclick="setCat('all',this)">Tất cả</span>
                <span class="filter-tag" data-cat="EatClean" onclick="setCat('EatClean',this)">🥗 Eat Clean</span>
                <span class="filter-tag" data-cat="Keto" onclick="setCat('Keto',this)">🥑 Keto</span>
                <span class="filter-tag" data-cat="LowCarb" onclick="setCat('LowCarb',this)">🥦 Low-carb</span>
                <span class="filter-tag" data-cat="GiamCan" onclick="setCat('GiamCan',this)">⚖️ Giảm cân</span>
                <span class="filter-tag" data-cat="TangCo" onclick="setCat('TangCo',this)">💪 Tăng cơ</span>
                <span class="filter-tag" data-cat="HighPro" onclick="setCat('HighPro',this)">🐟 High Protein</span>
            </div>
            <select class="form-control" id="sortSelect" style="width:160px" onchange="filterMenu()">
                <option value="default">Sắp xếp mặc định</option>
                <option value="cal-asc">Calo tăng dần</option>
                <option value="cal-desc">Calo giảm dần</option>
                <option value="price-asc">Giá tăng dần</option>
                <option value="price-desc">Giá giảm dần</option>
            </select>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
            <p class="text-sm text-muted" id="resultCount">Đang hiển thị tất cả món</p>
            <div style="display:flex;gap:.5rem">
                <span id="totalCal" class="badge badge-orange"></span>
            </div>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
    </main>

    <!-- Food detail modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal" style="max-width:580px">
            <div class="modal-header">
                <h3 id="dName">Tên món</h3>
                <button class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <div id="dEmoji"
                    style="font-size:5rem;text-align:center;margin-bottom:1rem;background:var(--green-50);border-radius:var(--radius-lg);padding:1.5rem">
                </div>
                <p id="dDesc" class="mb-2"></p>
                <div class="nutrition-chips mb-2" id="dChips"></div>
                <div style="background:var(--gray-100);border-radius:var(--radius-md);padding:1rem;margin-bottom:1rem">
                    <div
                        style="font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.75rem;color:var(--gray-600)">
                        Thành phần dinh dưỡng</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem" id="dNutr"></div>
                </div>
                <div class="form-group">
                    <label>Ghi chú / yêu cầu riêng</label>
                    <input type="text" id="dNote" class="form-control"
                        placeholder="VD: không hành, bớt muối, không cay...">
                </div>
                <div style="display:flex;align-items:center;gap:1rem">
                    <div class="qty-ctrl">
                        <button class="qty-btn" onclick="changeQty(-1)">−</button>
                        <span class="qty-num" id="dQty">1</span>
                        <button class="qty-btn" onclick="changeQty(1)">+</button>
                    </div>
                    <div style="font-size:1.3rem;font-weight:700;color:var(--green-700)" id="dTotalPrice"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('detailModal')">Đóng</button>
                <button class="btn btn-primary" id="dAddBtn">🛒 Thêm vào giỏ</button>
            </div>
        </div>
    </div>

    <!-- Cart sidebar -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 style="font-family:var(--font-display)">🛒 Giỏ hàng</h3>
            <button class="modal-close" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItemList"></div>
        <div class="cart-footer">
            <div class="cart-summary" id="cartSummary"></div>
            <button class="btn btn-primary btn-block" onclick="window.location.href='checkout.html'">Đặt hàng ngay
                →</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../assets/js/auth.js"></script>
    <script>
        const user = requireAuth(['customer']);
        if (user) document.getElementById('avatarBtn').textContent = user.avatar;
        updateCartCount();

        let currentCat = 'all';
        let currentProduct = null;
        let dQty = 1;

        // Check URL param
        const urlCat = new URLSearchParams(location.search).get('cat');
        if (urlCat) {
            currentCat = urlCat;
            document.querySelectorAll('.filter-tag').forEach(el => {
                el.classList.toggle('active', el.dataset.cat === urlCat || (urlCat && el.dataset.cat === 'all' && false));
                if (el.dataset.cat === urlCat) el.classList.add('active');
                if (el.dataset.cat === 'all') el.classList.remove('active');
            });
        }

        function setCat(cat, el) {
            currentCat = cat;
            document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            filterMenu();
        }

        function filterMenu() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            let items = MOCK_PRODUCTS.filter(p => {
                const matchCat = currentCat === 'all' || p.category === currentCat;
                const matchQ = !q || p.name.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
                return matchCat && matchQ;
            });
            if (sort === 'cal-asc') items.sort((a, b) => a.calories - b.calories);
            if (sort === 'cal-desc') items.sort((a, b) => b.calories - a.calories);
            if (sort === 'price-asc') items.sort((a, b) => a.price - b.price);
            if (sort === 'price-desc') items.sort((a, b) => b.price - a.price);
            renderMenu(items);
        }

        function renderMenu(items) {
            const grid = document.getElementById('menuGrid');
            document.getElementById('resultCount').textContent = `Hiển thị ${items.length} món`;
            if (!items.length) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)"><div style="font-size:3rem;margin-bottom:1rem">🔍</div><p>Không tìm thấy món phù hợp</p></div>`;
                return;
            }
            grid.innerHTML = items.map(p => `
    <div class="food-card animate-in" onclick="openDetail(${p.id})">
      <div class="food-img">
        <div class="food-tags">${p.tags.slice(0, 2).map(t => `<span class="badge badge-green">${t}</span>`).join('')}</div>
        <span style="font-size:4rem">${p.emoji}</span>
        <button class="fav-btn" onclick="event.stopPropagation();toggleFav(this)">🤍</button>
      </div>
      <div class="food-info">
        <div class="food-name">${p.name}</div>
        <div class="food-desc">${p.desc}</div>
        <div class="nutrition-chips mb-1">
          <span class="nutr-chip cal">🔥 ${p.calories} kcal</span>
          <span class="nutr-chip pro">💪 ${p.protein}g</span>
          <span class="nutr-chip fat">🥑 ${p.fat}g</span>
          <span class="nutr-chip carb">🌾 ${p.carb}g</span>
        </div>
        <div class="food-meta">
          <span class="food-price">${formatCurrency(p.price)}</span>
          <button class="food-add-btn" onclick="event.stopPropagation();quickAdd(${p.id})">+ Thêm</button>
        </div>
      </div>
    </div>
  `).join('');
        }

        function toggleFav(btn) { btn.textContent = btn.textContent === '❤️' ? '🤍' : '❤️'; }

        function quickAdd(id) {
            const p = MOCK_PRODUCTS.find(x => x.id === id);
            addToCart({ id: p.id, name: p.name, emoji: p.emoji, price: p.price, calories: p.calories });
            showToast(`Đã thêm ${p.name} 🛒`);
            renderCartSidebar();
        }

        function openDetail(id) {
            currentProduct = MOCK_PRODUCTS.find(x => x.id === id);
            dQty = 1;
            document.getElementById('dName').textContent = currentProduct.name;
            document.getElementById('dEmoji').textContent = currentProduct.emoji;
            document.getElementById('dDesc').textContent = currentProduct.desc;
            document.getElementById('dChips').innerHTML = `
    <span class="nutr-chip cal">🔥 ${currentProduct.calories} kcal</span>
    <span class="nutr-chip pro">💪 ${currentProduct.protein}g protein</span>
    <span class="nutr-chip fat">🥑 ${currentProduct.fat}g chất béo</span>
    <span class="nutr-chip carb">🌾 ${currentProduct.carb}g carbs</span>
  `;
            document.getElementById('dNutr').innerHTML = [
                ['Calories', currentProduct.calories + ' kcal'],
                ['Protein', currentProduct.protein + 'g'],
                ['Carbohydrates', currentProduct.carb + 'g'],
                ['Chất béo', currentProduct.fat + 'g'],
            ].map(([l, v]) => `<div style="font-size:.82rem"><span style="color:var(--gray-600)">${l}:</span> <strong>${v}</strong></div>`).join('');
            updateDetailPrice();
            document.getElementById('dAddBtn').onclick = () => {
                const note = document.getElementById('dNote').value;
                for (let i = 0; i < dQty; i++) addToCart({ id: currentProduct.id, name: currentProduct.name, emoji: currentProduct.emoji, price: currentProduct.price, calories: currentProduct.calories, note });
                showToast(`Đã thêm ${dQty}x ${currentProduct.name} vào giỏ 🛒`);
                closeModal('detailModal');
                renderCartSidebar();
            };
            openModal('detailModal');
        }

        function changeQty(d) {
            dQty = Math.max(1, dQty + d);
            document.getElementById('dQty').textContent = dQty;
            updateDetailPrice();
        }
        function updateDetailPrice() {
            if (currentProduct) document.getElementById('dTotalPrice').textContent = formatCurrency(currentProduct.price * dQty);
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); renderCartSidebar(); }

        function renderCartSidebar() {
            const cart = getCart();
            const list = document.getElementById('cartItemList');
            const summary = document.getElementById('cartSummary');
            if (!cart.length) {
                list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--gray-400)"><div style="font-size:3rem">🛒</div><p class="mt-1">Giỏ hàng trống</p></div>`;
                summary.innerHTML = '';
                return;
            }
            list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <span class="cart-item-emoji">${item.emoji}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">${formatCurrency(item.price * (item.qty || 1))}</div>
        ${item.note ? `<div style="font-size:.72rem;color:var(--accent-orange)">📝 ${item.note}</div>` : ''}
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeCartQty(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty || 1}</span>
        <button class="qty-btn" onclick="changeCartQty(${item.id},1)">+</button>
      </div>
    </div>
  `).join('');
            const sub = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
            const ship = 25000;
            summary.innerHTML = `
    <div class="cart-row"><span>Tạm tính</span><span>${formatCurrency(sub)}</span></div>
    <div class="cart-row"><span>Phí giao hàng</span><span>${formatCurrency(ship)}</span></div>
    <div class="cart-row cart-total"><span>Tổng cộng</span><span style="color:var(--green-700)">${formatCurrency(sub + ship)}</span></div>
  `;
        }

        function changeCartQty(id, d) {
            const cart = getCart();
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.qty = (item.qty || 1) + d;
            if (item.qty <= 0) { const idx = cart.indexOf(item); cart.splice(idx, 1); }
            saveCart(cart); updateCartCount(); renderCartSidebar();
        }

        filterMenu();
    </script>
</body>

</html>
