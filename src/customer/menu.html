<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFood — Thực đơn</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/customer.css">
</head>

<body>
    <!-- Navbar (tái sử dụng) -->
    <nav class="customer-nav">
        <div class="container nav-inner">
            <a href="home.html" class="nav-logo">
                <div class="nav-logo-icon">🥗</div>
                <span class="nav-logo-text">Fit<span>Food</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="home.html">Trang chủ</a></li>
                <li><a href="menu.html" class="active">Thực đơn</a></li>
                <li><a href="subscription.html">Gói ăn</a></li>
                <li><a href="nutrition-tracker.html">Dinh dưỡng</a></li>
                <li><a href="orders.html">Đơn hàng</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="cart-btn">🛒<span class="cart-count" style="display:none">0</span></a>
                <a href="profile.html" class="btn btn-secondary btn-sm">Tài khoản</a>
            </div>
        </div>
    </nav>

    <!-- Header trang -->
    <div style="background:linear-gradient(135deg,var(--green-50),var(--green-100));
    padding:var(--space-10) 0 var(--space-6)">
        <div class="container">
            <h1 style="margin-bottom:var(--space-2)">Thực đơn hôm nay 🌿</h1>
            <p class="text-muted">{{ Ngày hôm nay }} — Nguyên liệu tươi nhập sáng, chế biến theo đơn</p>
        </div>
    </div>

    <!-- Bộ lọc -->
    <div style="padding:var(--space-5) 0;background:white;border-bottom:1px solid var(--neutral-100);
    position:sticky;top:68px;z-index:50">
        <div class="container">
            <div class="filter-bar" style="box-shadow:none;border:none;padding:0">
                <button class="filter-chip active" data-filter="all">🍽 Tất cả</button>
                <button class="filter-chip" data-filter="eat-clean">🥗 Eat Clean</button>
                <button class="filter-chip" data-filter="keto">🥑 Keto</button>
                <button class="filter-chip" data-filter="low-carb">🌾 Low-Carb</button>
                <button class="filter-chip" data-filter="high-protein">💪 Tăng cơ</button>
                <div style="margin-left:auto;display:flex;gap:var(--space-3);align-items:center">
                    <input type="text" id="search-input" class="form-input"
                        style="max-width:220px;padding:var(--space-2) var(--space-4)" placeholder="🔍 Tìm món...">
                    <select class="form-select" id="sort-select"
                        style="max-width:160px;padding:var(--space-2) var(--space-3)">
                        <option value="default">Sắp xếp</option>
                        <option value="price-asc">Giá tăng dần</option>
                        <option value="price-desc">Giá giảm dần</option>
                        <option value="calories-asc">Calo thấp nhất</option>
                        <option value="calories-desc">Calo cao nhất</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Grid sản phẩm -->
    <section style="padding:var(--space-8) 0 var(--space-16)">
        <div class="container">
            <div style="display:flex;justify-content:space-between;align-items:center;
        margin-bottom:var(--space-5)">
                <span id="product-count" class="text-muted text-sm">Đang tải...</span>
            </div>
            <div id="products-grid" class="grid grid-4" style="gap:var(--space-5)">
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="spinner" style="width:32px;height:32px;border-width:3px"></div>
                    <p>Đang tải thực đơn...</p>
                </div>
            </div>
        </div>
    </section>

    <div id="toast-container"></div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/customer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await MenuFilter.loadProducts();

            // Cập nhật đếm sản phẩm
            const countEl = document.getElementById('product-count');
            const observer = new MutationObserver(() => {
                const cards = document.querySelectorAll('.food-card').length;
                if (countEl) countEl.textContent = `${cards} món ăn`;
            });
            observer.observe(document.getElementById('products-grid'), { childList: true });

            // Sắp xếp
            document.getElementById('sort-select')?.addEventListener('change', (e) => {
                const val = e.target.value;
                // Gọi hàm sắp xếp trong MenuFilter (có thể mở rộng)
                console.log('[Sort]', val);
            });
        });
    </script>
</body>

</html>
