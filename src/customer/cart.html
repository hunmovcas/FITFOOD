<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite — Giỏ hàng</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/customer.css">
</head>

<body>
    <nav class="customer-nav">
        <div class="customer-nav-inner">
            <div class="nav-brand"><span class="brand-leaf">🌿</span><span class="brand-text">GreenBite</span></div>
            <div class="nav-links">
                <a class="nav-link" href="home.html">Trang chủ</a>
                <a class="nav-link" href="menu.html">Thực đơn</a>
            </div>
            <div class="nav-right">
                <div class="user-avatar-btn" id="avatarBtn" onclick="window.location.href='profile.html'"></div>
            </div>
        </div>
    </nav>
    <main class="customer-main">
        <h2 style="font-family:var(--font-display);margin-bottom:1.5rem">🛒 Giỏ hàng của bạn</h2>
        <div class="grid-2" id="cartView" style="grid-template-columns:1fr 360px;align-items:start;gap:1.5rem">
            <!-- Items -->
            <div>
                <div class="card" id="cartItemsCard">
                    <div class="card-header">
                        <span class="section-title">Sản phẩm đã chọn</span>
                        <button class="btn btn-danger btn-sm" onclick="clearCart()">Xoá tất cả</button>
                    </div>
                    <div class="card-body" id="cartBody"></div>
                </div>
                <div class="card mt-2">
                    <div class="card-header"><span class="section-title">🧾 Voucher giảm giá</span></div>
                    <div class="card-body" style="display:flex;gap:.75rem">
                        <input type="text" class="form-control" id="voucherInput" placeholder="Nhập mã giảm giá..."
                            style="flex:1">
                        <button class="btn btn-secondary" onclick="applyVoucher()">Áp dụng</button>
                    </div>
                </div>
            </div>
            <!-- Summary -->
            <div class="card" id="summaryCard" style="position:sticky;top:80px">
                <div class="card-header"><span class="section-title">Tóm tắt đơn hàng</span></div>
                <div class="card-body" id="summaryBody"></div>
                <div class="card-footer">
                    <button class="btn btn-primary btn-block btn-lg" onclick="window.location.href='checkout.html'">Tiến
                        hành đặt hàng →</button>
                    <button class="btn btn-outline btn-block mt-1" onclick="window.location.href='menu.html'">← Tiếp tục
                        mua</button>
                </div>
            </div>
        </div>
        <!-- Empty state -->
        <div id="emptyCart" class="hidden" style="text-align:center;padding:4rem">
            <div style="font-size:5rem;margin-bottom:1rem">🛒</div>
            <h3 style="font-family:var(--font-display);margin-bottom:.5rem">Giỏ hàng trống!</h3>
            <p class="text-muted mb-2">Hãy thêm một vài món ngon vào giỏ nhé.</p>
            <button class="btn btn-primary btn-lg" onclick="window.location.href='menu.html'">Xem thực đơn</button>
        </div>
    </main>
    <div id="toast-container"></div>
    <script src="../../assets/js/auth.js"></script>
    <script>
        const user = requireAuth(['customer']);
        if (user) document.getElementById('avatarBtn').textContent = user.avatar;
        let discount = 0;

        function renderCart() {
            const cart = getCart();
            if (!cart.length) {
                document.getElementById('cartView').classList.add('hidden');
                document.getElementById('emptyCart').classList.remove('hidden');
                return;
            }
            document.getElementById('cartView').classList.remove('hidden');
            document.getElementById('emptyCart').classList.add('hidden');
            const body = document.getElementById('cartBody');
            body.innerHTML = cart.map(item => `
    <div style="display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid #f5f5f2">
      <div style="font-size:2.5rem;width:60px;text-align:center;background:var(--green-50);border-radius:var(--radius-md);padding:.5rem">${item.emoji}</div>
      <div style="flex:1">
        <div style="font-weight:600;margin-bottom:.2rem">${item.name}</div>
        ${item.note ? `<div style="font-size:.75rem;color:var(--accent-orange)">📝 ${item.note}</div>` : ''}
        <div style="font-size:.8rem;color:var(--gray-400)">🔥 ${item.calories} kcal / món</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="adj(${item.id},-1)">−</button>
        <span class="qty-num">${item.qty || 1}</span>
        <button class="qty-btn" onclick="adj(${item.id},1)">+</button>
      </div>
      <div style="min-width:90px;text-align:right;font-weight:700;color:var(--green-700)">${formatCurrency(item.price * (item.qty || 1))}</div>
      <button onclick="adj(${item.id},-99)" style="background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:1.1rem">🗑</button>
    </div>
  `).join('');

            const sub = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
            const ship = 25000;
            const total = sub + ship - discount;
            const totalCal = cart.reduce((s, i) => s + (i.calories || 0) * (i.qty || 1), 0);
            document.getElementById('summaryBody').innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.9rem"><span>Tạm tính (${cart.reduce((s, i) => s + (i.qty || 1), 0)} món)</span><span>${formatCurrency(sub)}</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.9rem"><span>Phí giao hàng</span><span>${formatCurrency(ship)}</span></div>
    ${discount ? `<div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.9rem;color:var(--green-600)"><span>Giảm giá voucher</span><span>-${formatCurrency(discount)}</span></div>` : ''}
    <hr class="divider">
    <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700"><span>Tổng cộng</span><span style="color:var(--green-700)">${formatCurrency(total)}</span></div>
    <div class="badge badge-orange mt-2" style="font-size:.78rem">🔥 Tổng ${totalCal} kcal đơn hàng này</div>
  `;
        }

        function adj(id, d) {
            const cart = getCart();
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.qty = (item.qty || 1) + d;
            if (item.qty <= 0) cart.splice(cart.indexOf(item), 1);
            saveCart(cart); updateCartCount(); renderCart();
        }

        function clearCart() {
            if (confirm('Xoá toàn bộ giỏ hàng?')) { saveCart([]); updateCartCount(); renderCart(); }
        }

        function applyVoucher() {
            const code = document.getElementById('voucherInput').value.trim().toUpperCase();
            const voucher = MOCK_VOUCHERS.find(v => v.code === code && v.status === 'active');
            if (!voucher) { showToast('Mã voucher không hợp lệ hoặc đã hết hạn', 'error'); return; }
            const cart = getCart();
            const sub = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
            if (sub < voucher.minOrder) { showToast(`Đơn tối thiểu ${formatCurrency(voucher.minOrder)} để dùng voucher này`, 'warning'); return; }
            if (voucher.type === 'percent') discount = Math.round(sub * voucher.discount / 100);
            else discount = voucher.discount;
            showToast(`Áp dụng thành công! Giảm ${formatCurrency(discount)} 🎉`);
            renderCart();
        }

        renderCart();
        updateCartCount();
    </script>
</body>

</html>
