<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitFood — Giỏ hàng</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/customer.css">
</head>

<body>
    <nav class="customer-nav">
        <div class="container nav-inner">
            <a href="home.html" class="nav-logo">
                <div class="nav-logo-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg></div>
                <span class="nav-logo-text">Fit<span style="font-weight: 500;">Food</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="home.html">Trang chủ</a></li>
                <li><a href="menu.html">Thực đơn</a></li>
            </ul>
            <div class="nav-actions">
                <a href="cart.html" class="cart-btn">🛒<span class="cart-count" style="display:none">0</span></a>
            </div>
        </div>
    </nav>

    <div style="padding:var(--space-10) 0 var(--space-16)">
        <div class="container">
            <h2 style="margin-bottom:var(--space-8)">🛒 Giỏ hàng của bạn</h2>

            <div style="display:grid;grid-template-columns:1fr 360px;gap:var(--space-8);align-items:start">
                <!-- Danh sách món -->
                <div>
                    <div id="cart-items-container">
                        <!-- Render bởi JS -->
                    </div>

                    <!-- Tổng calo -->
                    <div class="card" style="background:var(--green-50);border-color:var(--green-200);
            margin-top:var(--space-4);display:flex;align-items:center;gap:var(--space-4)">
                        <span style="font-size:1.5rem">🔥</span>
                        <div>
                            <div style="font-weight:700;color:var(--green-800)">
                                Tổng: <span id="cart-total-calories">0</span> kcal hôm nay
                            </div>
                            <div style="font-size:.8125rem;color:var(--green-700)">
                                Nhu cầu cơ thể trung bình: ~2000 kcal/ngày
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tóm tắt đơn hàng -->
                <div>
                    <div class="card" style="position:sticky;top:90px">
                        <h4 style="margin-bottom:var(--space-5);padding-bottom:var(--space-4);
              border-bottom:1px solid var(--neutral-100)">Tóm tắt đơn hàng</h4>

                        <div style="display:flex;flex-direction:column;gap:var(--space-3);
              margin-bottom:var(--space-5)">
                            <div style="display:flex;justify-content:space-between;font-size:.9rem">
                                <span class="text-muted">Tạm tính:</span>
                                <span id="summary-subtotal" class="font-semibold">0₫</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:.9rem">
                                <span class="text-muted">Phí giao hàng:</span>
                                <span class="font-semibold text-green">Miễn phí</span>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:.9rem">
                                <span class="text-muted">Giảm giá:</span>
                                <span id="summary-discount" class="font-semibold text-red">-0₫</span>
                            </div>
                        </div>

                        <!-- Voucher -->
                        <div style="display:flex;gap:var(--space-2);margin-bottom:var(--space-5)">
                            <input type="text" id="voucher-input" class="form-input" placeholder="Nhập mã giảm giá...">
                            <button onclick="applyVoucher()" class="btn btn-secondary btn-sm">Áp dụng</button>
                        </div>

                        <div class="divider" style="margin:var(--space-4) 0"></div>

                        <div style="display:flex;justify-content:space-between;align-items:center;
              margin-bottom:var(--space-6)">
                            <span class="font-bold text-lg">Tổng cộng:</span>
                            <span id="summary-total" class="food-price" style="font-size:1.5rem">0₫</span>
                        </div>

                        <a href="checkout.html" class="btn btn-primary w-full btn-lg" id="checkout-btn">
                            Đặt hàng ngay →
                        </a>
                        <a href="menu.html" class="btn btn-ghost w-full" style="margin-top:var(--space-3)">
                            ← Tiếp tục chọn món
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/customer.js"></script>
    <script>
        /* --- Render giỏ hàng --- */
        function renderCartPage() {
            const items = Cart.getItems();
            const container = document.getElementById('cart-items-container');
            const total = Cart.getTotal();
            const cals = Cart.getTotalCalories();

            // Cập nhật tóm tắt
            document.getElementById('summary-subtotal').textContent = formatPrice(total);
            document.getElementById('summary-total').textContent = formatPrice(total);
            document.getElementById('cart-total-calories').textContent = cals;

            if (items.length === 0) {
                container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <h3>Giỏ hàng trống</h3>
            <p>Hãy thêm một số món ăn healthy vào giỏ!</p>
            <a href="menu.html" class="btn btn-primary" style="margin-top:var(--space-4)">
              Xem thực đơn →
            </a>
          </div>`;
                document.getElementById('checkout-btn').style.opacity = '.5';
                document.getElementById('checkout-btn').style.pointerEvents = 'none';
                return;
            }

            container.innerHTML = items.map(item => `
        <div class="card" style="display:flex;align-items:center;gap:var(--space-4);
          margin-bottom:var(--space-4);padding:var(--space-4) var(--space-5)">
          <div style="font-size:2rem;flex-shrink:0">${item.image || '🍱'}</div>
          <div style="flex:1;min-width:0">
            <div class="font-semibold" style="margin-bottom:4px">${item.name}</div>
            <div class="text-sm text-muted">${item.calories || 0} kcal · ${formatPrice(item.price)}/phần</div>
            ${item.notes ? `<div class="text-sm" style="color:var(--amber-500);margin-top:4px">📝 ${item.notes}</div>` : ''}
            <!-- Chỉnh ghi chú cá nhân hóa -->
            <input type="text" placeholder="Thêm ghi chú (không hành, bớt muối...)"
              value="${item.notes || ''}"
              class="form-input" style="margin-top:var(--space-3);font-size:.8125rem;padding:var(--space-2) var(--space-3)"
              onchange="Cart.updateNotes(${item.id}, this.value)">
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-3);flex-shrink:0">
            <button onclick="Cart.updateQty(${item.id}, ${item.qty - 1}); renderCartPage()"
              style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--neutral-200);
              background:white;cursor:pointer;font-size:1rem">-</button>
            <span class="font-bold">${item.qty}</span>
            <button onclick="Cart.updateQty(${item.id}, ${item.qty + 1}); renderCartPage()"
              style="width:32px;height:32px;border-radius:50%;border:1.5px solid var(--neutral-200);
              background:white;cursor:pointer;font-size:1rem">+</button>
          </div>
          <div class="font-bold text-green" style="min-width:90px;text-align:right">
            ${formatPrice(item.price * item.qty)}
          </div>
          <button onclick="Cart.removeItem(${item.id}); renderCartPage()"
            style="background:none;border:none;cursor:pointer;color:var(--neutral-400);font-size:1.1rem"
            title="Xóa món">✕</button>
        </div>`).join('');
        }

        /* --- Áp dụng voucher --- */
        async function applyVoucher() {
            const code = document.getElementById('voucher-input').value.trim();
            if (!code) { Toast.show('Vui lòng nhập mã voucher', 'warning'); return; }

            try {
                const res = await API.post('/api/marketing/vouchers/validate', {
                    code, total: Cart.getTotal()
                });
                if (res.discount) {
                    const newTotal = Cart.getTotal() - res.discount;
                    document.getElementById('summary-discount').textContent = `-${formatPrice(res.discount)}`;
                    document.getElementById('summary-total').textContent = formatPrice(newTotal);
                    Toast.show(`✅ Áp dụng voucher thành công! Giảm ${formatPrice(res.discount)}`, 'success');
                }
            } catch {
                Toast.show('Mã voucher không hợp lệ hoặc đã hết hạn', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', renderCartPage);
    </script>
</body>

</html>
