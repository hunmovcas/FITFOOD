<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite — Kitchen Display System</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/kitchen.css">
</head>

<body>

    <!-- ── KDS Layout ── -->
    <div class="kds-layout">

        <!-- ── Top Bar ── -->
        <div class="kds-topbar">
            <div class="kds-logo">🌿 GreenBite KDS</div>

            <!-- Live stats -->
            <div class="kds-stats">
                <div class="kds-stat">
                    <div class="val" id="statTotal">0</div>
                    <div class="lbl">TỔNG ĐƠN</div>
                </div>
                <div class="kds-stat">
                    <div class="val" id="statPreparing">0</div>
                    <div class="lbl">ĐANG LÀM</div>
                </div>
                <div class="kds-stat">
                    <div class="val" id="statDone">0</div>
                    <div class="lbl">XONG HÔM NAY</div>
                </div>
                <div class="kds-stat">
                    <div class="val" id="statAvg">0'</div>
                    <div class="lbl">TB CHẾ BIẾN</div>
                </div>
            </div>

            <!-- Clock + controls -->
            <div style="display:flex;align-items:center;gap:1rem">
                <button onclick="addDemoOrder()"
                    style="background:var(--green-700);border:none;color:#fff;padding:.4rem .9rem;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;font-weight:700">+
                    Demo Đơn</button>
                <div class="kds-time" id="kdsClock">00:00:00</div>
                <button onclick="logout()"
                    style="background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:.4rem .75rem;border-radius:var(--radius-sm);cursor:pointer;font-size:.78rem">Thoát</button>
            </div>
        </div>

        <!-- ── Category filter tabs ── -->
        <div style="background:#111;padding:.5rem 1rem;display:flex;gap:.5rem;border-bottom:1px solid #222">
            <button class="kds-tab active" data-tab="all" onclick="setKdsTab('all',this)">Tất cả</button>
            <button class="kds-tab" data-tab="pending" onclick="setKdsTab('pending',this)">⏳ Chờ</button>
            <button class="kds-tab" data-tab="preparing" onclick="setKdsTab('preparing',this)">👨‍🍳 Đang làm</button>
            <button class="kds-tab" data-tab="ready" onclick="setKdsTab('ready',this)">✅ Xong</button>
        </div>
        <style>
            .kds-tab {
                padding: .35rem .85rem;
                border: none;
                background: rgba(255, 255, 255, .06);
                color: #888;
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-size: .8rem;
                font-weight: 700;
                transition: var(--transition);
            }

            .kds-tab.active,
            .kds-tab:hover {
                background: var(--green-700);
                color: #fff;
            }
        </style>

        <!-- ── Ticket Board ── -->
        <div class="kds-board" id="kdsBoard"></div>
    </div>

    <!-- ── Complete Order Modal ── -->
    <div class="modal-overlay" id="completeModal">
        <div class="modal" style="max-width:420px">
            <div class="modal-header">
                <h3 style="font-family:var(--font-display)">✅ Xác nhận hoàn thành</h3>
                <button class="modal-close">✕</button>
            </div>
            <div class="modal-body" id="completeModalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('completeModal')">Huỷ</button>
                <button class="btn btn-primary" id="confirmCompleteBtn">Xác nhận hoàn thành</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../assets/js/auth.js"></script>
    <script>
        /* ── Auth ── */
        requireAuth(['kitchen', 'cashier', 'admin']);
        startClock('#kdsClock');

        /* ── Order state ── */
        let orders = [
            {
                id: '#2401', num: '01', status: 'preparing', time: Date.now() - 12 * 60000,
                customer: 'Nguyễn Minh Anh', type: 'online',
                items: [
                    { name: 'Gà nướng Keto', emoji: '🍗', qty: 1, note: '' },
                    { name: 'Salad Low-carb', emoji: '🥬', qty: 1, note: 'Không hành tây' }
                ]
            },
            {
                id: '#2402', num: '02', status: 'pending', time: Date.now() - 5 * 60000,
                customer: 'Trần Thị Bình', type: 'online',
                items: [
                    { name: 'Cá hồi áp chảo', emoji: '🐟', qty: 1, note: 'Ít muối' },
                    { name: 'Sinh tố xanh', emoji: '🥤', qty: 1, note: '' }
                ]
            },
            {
                id: '#2403', num: '03', status: 'preparing', time: Date.now() - 8 * 60000,
                customer: 'Lê Quang Minh', type: 'online',
                items: [
                    { name: 'Bát Buddha Eat Clean', emoji: '🥗', qty: 2, note: 'Không đậu phọng' }
                ]
            },
            {
                id: '#2404', num: '04', status: 'pending', time: Date.now() - 2 * 60000,
                customer: 'POS - Tại quầy', type: 'pos',
                items: [
                    { name: 'Bò Keto Salad', emoji: '🥩', qty: 1, note: '' },
                    { name: 'Sinh tố xanh', emoji: '🥤', qty: 2, note: 'Ít đường' }
                ]
            },
            {
                id: '#2405', num: '05', status: 'ready', time: Date.now() - 20 * 60000,
                customer: 'Vũ Đức Long', type: 'online',
                items: [
                    { name: 'Yến mạch Protein', emoji: '🥣', qty: 1, note: '' }
                ]
            }
        ];

        let doneCount = 3; // mock completed orders today
        let kdsFilter = 'all';
        let pendingComplete = null;

        /* ── Elapsed time helper ── */
        function elapsed(ms) {
            const m = Math.floor((Date.now() - ms) / 60000);
            return m;
        }

        /* ── Urgency level ── */
        function urgencyClass(mins, status) {
            if (status === 'ready') return '';
            if (mins >= 20) return 'urgent';
            if (mins >= 12) return 'warning';
            return '';
        }

        /* ── Render board ── */
        function renderBoard() {
            const board = document.getElementById('kdsBoard');
            const active = orders.filter(o => o.status !== 'completed');
            const shown = kdsFilter === 'all' ? active : active.filter(o => o.status === kdsFilter);

            // Update stats
            document.getElementById('statTotal').textContent = shown.length;
            document.getElementById('statPreparing').textContent = orders.filter(o => o.status === 'preparing').length;
            document.getElementById('statDone').textContent = doneCount;
            const times = orders.filter(o => o.status !== 'pending').map(o => elapsed(o.time));
            document.getElementById('statAvg').textContent = times.length ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) + "'" : "0'";

            if (!shown.length) {
                board.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:#444">
            <div style="font-size:4rem;margin-bottom:1rem">✅</div>
            <div style="font-family:var(--font-display);font-size:1.5rem;color:var(--green-400)">Không có đơn nào!</div>
            <div style="color:#666;font-size:.88rem;margin-top:.5rem">Tất cả đã được phục vụ</div>
        </div>`;
                return;
            }

            board.innerHTML = shown.map(order => {
                const mins = elapsed(order.time);
                const urg = urgencyClass(mins, order.status);
                const timerClass = urg;

                return `
        <div class="kds-ticket ${urg}" id="ticket-${order.id}">
            <!-- Header -->
            <div class="kds-ticket-header">
                <div>
                    <div class="kds-order-num">${order.id} · ${order.type === 'pos' ? '🏪 POS' : '📱 Online'}</div>
                    <div style="font-size:.82rem;color:#ccc;margin-top:.1rem">${order.customer}</div>
                </div>
                <div>
                    <div class="kds-timer ${timerClass}">${mins}'</div>
                    <div style="font-size:.65rem;text-align:center;color:#666;margin-top:.1rem">
                        ${order.status === 'pending' ? '⏳ CHỜ' : order.status === 'preparing' ? '👨‍🍳 ĐANG LÀM' : '✅ XONG'}
                    </div>
                </div>
            </div>

            <!-- Items -->
            <div class="kds-ticket-body">
                ${order.items.map(item => `
                <div class="kds-item">
                    <div class="kds-item-qty">${item.qty}x</div>
                    <div>
                        <div class="kds-item-name">${item.emoji} ${item.name}</div>
                        ${item.note ? `<div class="kds-item-note">📝 ${item.note}</div>` : ''}
                    </div>
                </div>`).join('')}
            </div>

            <!-- Footer actions -->
            <div class="kds-ticket-footer">
                ${order.status === 'pending' ? `
                    <button class="kds-btn" style="background:#444;color:#ccc" onclick="bumpOrder('${order.id}')">Bỏ qua</button>
                    <button class="kds-btn kds-btn-done" onclick="startCooking('${order.id}')">👨‍🍳 Bắt đầu nấu</button>
                ` : order.status === 'preparing' ? `
                    <button class="kds-btn kds-btn-bump" onclick="bumpOrder('${order.id}')">Đẩy sau</button>
                    <button class="kds-btn kds-btn-done" onclick="markReady('${order.id}')">✅ Hoàn thành</button>
                ` : `
                    <button class="kds-btn kds-btn-bump" onclick="recallOrder('${order.id}')">↩ Xem lại</button>
                    <button class="kds-btn kds-btn-done" onclick="dispatchOrder('${order.id}')">🛵 Giao hàng</button>
                `}
            </div>
        </div>`;
            }).join('');
        }

        /* ── Actions ── */
        function startCooking(id) {
            const o = orders.find(x => x.id === id);
            if (o) { o.status = 'preparing'; showToast(`Bắt đầu chế biến ${o.id} 👨‍🍳`, 'info'); renderBoard(); }
        }

        function markReady(id) {
            const o = orders.find(x => x.id === id);
            if (!o) return;
            pendingComplete = o;
            document.getElementById('completeModalBody').innerHTML = `
        <div style="background:#1a1a1a;border-radius:var(--radius-md);padding:1rem;margin-bottom:1rem">
            <div style="color:#ccc;font-size:.82rem;margin-bottom:.5rem">${o.id} · ${o.customer}</div>
            ${o.items.map(i => `<div style="display:flex;gap:.5rem;align-items:center;padding:.35rem 0;border-bottom:1px solid #2a2a2a;font-size:.88rem;color:#eee">
                <span>${i.emoji}</span><span>${i.qty}x ${i.name}</span>
                ${i.note ? `<span style="color:var(--accent-orange);font-size:.75rem;margin-left:auto">📝 ${i.note}</span>` : ''}
            </div>`).join('')}
        </div>
        <p style="font-size:.88rem;color:var(--gray-600)">Xác nhận tất cả món đã được chế biến và đóng gói đúng tiêu chuẩn?</p>`;
            document.getElementById('confirmCompleteBtn').onclick = () => {
                o.status = 'ready';
                closeModal('completeModal');
                showToast(`Đơn ${o.id} hoàn thành! In tem dinh dưỡng... 🏷️`, 'success');
                renderBoard();
            };
            openModal('completeModal');
        }

        function dispatchOrder(id) {
            const o = orders.find(x => x.id === id);
            if (o) {
                o.status = 'completed';
                doneCount++;
                showToast(`Đơn ${o.id} đã bàn giao shipper 🛵`, 'success');
                renderBoard();
            }
        }

        function bumpOrder(id) {
            const idx = orders.findIndex(x => x.id === id);
            if (idx > -1) { orders.push(orders.splice(idx, 1)[0]); renderBoard(); }
        }

        function recallOrder(id) {
            const o = orders.find(x => x.id === id);
            if (o) { o.status = 'preparing'; renderBoard(); }
        }

        /* ── Tab filter ── */
        function setKdsTab(tab, el) {
            kdsFilter = tab;
            document.querySelectorAll('.kds-tab').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderBoard();
        }

        /* ── Add demo order ── */
        const DEMO_POOL = [
            { name: 'Wrap Tôm Cuộn', emoji: '🌯', note: 'Ít sốt' },
            { name: 'Cơm gạo lứt gà', emoji: '🍚', note: '' },
            { name: 'Súp miso rau củ', emoji: '🍜', note: 'Nóng' },
            { name: 'Smoothie Bowl', emoji: '🫐', note: '' },
        ];
        let demoCount = 6;

        function addDemoOrder() {
            const item1 = DEMO_POOL[Math.floor(Math.random() * DEMO_POOL.length)];
            const item2 = DEMO_POOL[Math.floor(Math.random() * DEMO_POOL.length)];
            demoCount++;
            orders.unshift({
                id: `#24${String(demoCount).padStart(2, '0')}`,
                num: String(demoCount).padStart(2, '0'),
                status: 'pending',
                time: Date.now(),
                customer: ['Khách online', 'POS - Quầy'][Math.floor(Math.random() * 2)],
                type: ['online', 'pos'][Math.floor(Math.random() * 2)],
                items: [
                    { ...item1, qty: 1 },
                    ...(Math.random() > 0.5 ? [{ ...item2, qty: 1 }] : [])
                ]
            });
            renderBoard();
            showToast('📱 Đơn mới vừa vào!', 'info');
        }

        /* ── Auto refresh every 30 seconds ── */
        setInterval(() => renderBoard(), 30000);

        /* ── Init ── */
        renderBoard();
    </script>
</body>

</html>
