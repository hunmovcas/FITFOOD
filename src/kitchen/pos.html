<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite — POS Thu ngân</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/kitchen.css">
</head>

<body>

    <!-- ── POS Layout ── -->
    <div class="pos-layout">

        <!-- ═══════════ LEFT: Menu ═══════════ -->
        <div class="pos-left">
            <!-- Top bar -->
            <div class="pos-topbar">
                <div class="brand">🌿 GreenBite POS</div>
                <div style="display:flex;gap:.5rem">
                    <a href="kds.html" style="color:rgba(255,255,255,.7);font-size:.82rem;font-weight:600">KDS →</a>
                    <a href="inventory.html"
                        style="color:rgba(255,255,255,.7);font-size:.82rem;font-weight:600;margin-left:.75rem">Kho →</a>
                </div>
                <div style="display:flex;align-items:center;gap:.75rem;margin-left:auto">
                    <div style="font-size:.82rem;opacity:.7" id="cashierName"></div>
                    <div class="time-display" id="posClock">00:00:00</div>
                </div>
            </div>

            <!-- Search bar -->
            <div style="padding:1rem;background:#fff;border-bottom:1px solid #f0f0ed;position:sticky;top:0;z-index:10">
                <input type="text" id="posSearch" class="form-control" placeholder="🔍 Tìm món theo tên..."
                    oninput="filterItems()" style="max-width:400px">
            </div>

            <!-- Category filter -->
            <div class="pos-categories" style="padding:1rem 0 .5rem">
                <button class="pos-cat-btn active" data-cat="all" onclick="setPosCat('all',this)">Tất cả</button>
                <button class="pos-cat-btn" data-cat="EatClean" onclick="setPosCat('EatClean',this)">🥗 Eat
                    Clean</button>
                <button class="pos-cat-btn" data-cat="Keto" onclick="setPosCat('Keto',this)">🥑 Keto</button>
                <button class="pos-cat-btn" data-cat="LowCarb" onclick="setPosCat('LowCarb',this)">🥦 Low-carb</button>
                <button class="pos-cat-btn" data-cat="GiamCan" onclick="setPosCat('GiamCan',this)">⚖️ Giảm cân</button>
                <button class="pos-cat-btn" data-cat="TangCo" onclick="setPosCat('TangCo',this)">💪 Tăng cơ</button>
                <button class="pos-cat-btn" data-cat="HighPro" onclick="setPosCat('HighPro',this)">🐟 High
                    Protein</button>
            </div>

            <!-- Items grid -->
            <div class="pos-items-grid" id="posGrid"></div>
        </div>

        <!-- ═══════════ RIGHT: Order Panel ═══════════ -->
        <div class="pos-right">
            <div class="order-panel">
                <!-- Header -->
                <div class="order-header">
                    <div style="display:flex;align-items:center;justify-content:space-between">
                        <h3>Đơn hàng mới</h3>
                        <div style="display:flex;gap:.5rem">
                            <button class="btn btn-secondary btn-sm" onclick="holdOrder()">⏸ Giữ</button>
                            <button class="btn btn-danger btn-sm" onclick="clearOrder()">✕ Xoá</button>
                        </div>
                    </div>
                    <div style="margin-top:.5rem;font-size:.78rem;color:var(--gray-400)">
                        Đơn #<span id="orderNumDisplay">2406</span> · <span id="orderTime"></span>
                    </div>
                </div>

                <!-- Items list -->
                <div class="order-items-list" id="orderItemsList">
                    <div style="text-align:center;padding:2rem;color:var(--gray-400)">
                        <div style="font-size:2.5rem;margin-bottom:.5rem">🛒</div>
                        <p class="text-sm">Chọn món từ thực đơn bên trái</p>
                    </div>
                </div>

                <!-- Notes -->
                <div class="order-notes">
                    <textarea id="orderNote" rows="2"
                        placeholder="📝 Ghi chú đặc biệt: không hành, ít cay..."></textarea>
                </div>

                <!-- Footer -->
                <div class="order-footer">
                    <!-- Summary -->
                    <div class="order-summary" id="orderSummary">
                        <div class="order-row"><span>Tạm tính</span><span id="subTotalDisplay">0đ</span></div>
                        <div class="order-row" id="discountRow" style="display:none;color:var(--green-600)"><span>Giảm
                                giá</span><span id="discountDisplay"></span></div>
                        <div class="order-row order-total-row"><span>Tổng cộng</span><span id="totalDisplay"
                                style="color:var(--green-700)">0đ</span></div>
                        <div class="order-row text-xs text-muted" id="calDisplay"></div>
                    </div>

                    <!-- Voucher -->
                    <div style="display:flex;gap:.5rem;margin-bottom:.75rem">
                        <input type="text" id="posVoucher" class="form-control" placeholder="Mã voucher..."
                            style="font-size:.82rem">
                        <button class="btn btn-secondary btn-sm" onclick="applyPosVoucher()">Áp dụng</button>
                    </div>

                    <!-- Payment buttons -->
                    <div class="payment-btns">
                        <button class="pay-btn" id="payOnline" onclick="setPayment('online')">💳 Online</button>
                        <button class="pay-btn active" id="payCash" onclick="setPayment('cash')">💵 Tiền mặt</button>
                    </div>

                    <!-- Cash return calculator -->
                    <div id="cashCalc"
                        style="background:var(--green-50);border-radius:var(--radius-md);padding:.75rem;margin-bottom:.75rem">
                        <label style="font-size:.78rem;color:var(--gray-600);display:block;margin-bottom:.3rem">Khách
                            đưa (đ):</label>
                        <div style="display:flex;gap:.5rem">
                            <input type="number" id="cashGiven" class="form-control" placeholder="0"
                                oninput="calcChange()" style="font-size:.9rem">
                            <div
                                style="background:#fff;border-radius:var(--radius-sm);padding:.5rem .75rem;border:1.5px solid #e2e8f0;min-width:90px;text-align:center">
                                <div style="font-size:.68rem;color:var(--gray-400)">Tiền thừa</div>
                                <div style="font-weight:700;color:var(--green-700);font-size:.9rem" id="changeDisplay">
                                    0đ</div>
                            </div>
                        </div>
                        <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.5rem">
                            ${[50000,100000,200000,500000].map(v => `<button onclick="setCash(${v})"
                                style="background:var(--green-100);border:none;border-radius:var(--radius-sm);padding:.2rem .6rem;font-size:.72rem;cursor:pointer;font-weight:600;color:var(--green-800)">${v/1000}k</button>`).join('')}
                        </div>
                    </div>

                    <!-- Confirm button -->
                    <button class="btn btn-primary btn-block btn-lg" onclick="processPayment()">
                        ✅ Xác nhận thanh toán
                    </button>
                    <button class="btn btn-secondary btn-block mt-1" style="font-size:.82rem" onclick="printReceipt()">
                        🖨️ In hoá đơn
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Receipt Modal ── -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal" style="max-width:400px">
            <div class="modal-header">
                <h3 style="font-family:var(--font-display)">🧾 Hoá đơn</h3>
                <button class="modal-close">✕</button>
            </div>
            <div class="modal-body" id="receiptBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('receiptModal');newOrder()">Đơn mới</button>
                <button class="btn btn-primary" onclick="window.print()">🖨️ In</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../assets/js/auth.js"></script>
    <script>
        /* ── Auth ── */
        const user = requireAuth(['cashier', 'admin']);
        if (user) document.getElementById('cashierName').textContent = user.name;
        startClock('#posClock');
        document.getElementById('orderTime').textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

        /* ── State ── */
        let orderItems = [];  // { ...product, qty, note }
        let posCategory = 'all';
        let paymentMethod = 'cash';
        let posDiscount = 0;
        let orderCounter = 2406;

        /* ── Render menu grid ── */
        function renderGrid() {
            const q = (document.getElementById('posSearch').value || '').toLowerCase();
            const grid = document.getElementById('posGrid');
            const items = MOCK_PRODUCTS.filter(p => {
                const matchCat = posCategory === 'all' || p.category === posCategory;
                const matchQ = !q || p.name.toLowerCase().includes(q);
                return matchCat && matchQ;
            });

            if (!items.length) { grid.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gray-400);grid-column:1/-1">Không tìm thấy món</div>'; return; }

            grid.innerHTML = items.map(p => {
                const inOrder = orderItems.find(i => i.id === p.id);
                return `
        <div class="pos-item ${inOrder ? 'selected' : ''}" onclick="addPosItem(${p.id})" style="position:relative">
            ${inOrder ? `<div style="position:absolute;top:.5rem;right:.5rem;background:var(--green-600);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700">${inOrder.qty}</div>` : ''}
            <div class="item-emoji">${p.emoji}</div>
            <div class="item-name">${p.name}</div>
            <div class="item-price">${formatCurrency(p.price)}</div>
            <div class="item-cal">🔥 ${p.calories} kcal</div>
        </div>`;
            }).join('');
        }

        function setPosCat(cat, el) {
            posCategory = cat;
            document.querySelectorAll('.pos-cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderGrid();
        }

        function filterItems() { renderGrid(); }

        /* ── Add item to order ── */
        function addPosItem(id) {
            const p = MOCK_PRODUCTS.find(x => x.id === id);
            if (!p) return;
            const existing = orderItems.find(i => i.id === id);
            if (existing) existing.qty++;
            else orderItems.push({ ...p, qty: 1 });
            renderOrder();
            renderGrid();
        }

        /* ── Render order panel ── */
        function renderOrder() {
            const list = document.getElementById('orderItemsList');

            if (!orderItems.length) {
                list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--gray-400)"><div style="font-size:2.5rem;margin-bottom:.5rem">🛒</div><p class="text-sm">Chọn món từ thực đơn bên trái</p></div>';
                updateTotals();
                return;
            }

            list.innerHTML = orderItems.map(item => `
    <div class="order-line">
        <span class="line-emoji">${item.emoji}</span>
        <span class="line-name">${item.name}</span>
        <div class="line-qty qty-ctrl">
            <button class="qty-btn" onclick="adjPosQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="adjPosQty(${item.id},1)">+</button>
        </div>
        <span class="line-price">${formatCurrency(item.price * item.qty)}</span>
    </div>`).join('');

            updateTotals();
        }

        function adjPosQty(id, d) {
            const item = orderItems.find(i => i.id === id);
            if (!item) return;
            item.qty += d;
            if (item.qty <= 0) orderItems = orderItems.filter(i => i.id !== id);
            renderOrder();
            renderGrid();
        }

        /* ── Totals ── */
        function updateTotals() {
            const sub = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
            const total = Math.max(0, sub - posDiscount);
            const cal = orderItems.reduce((s, i) => s + i.calories * i.qty, 0);

            document.getElementById('subTotalDisplay').textContent = formatCurrency(sub);
            document.getElementById('totalDisplay').textContent = formatCurrency(total);
            if (posDiscount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountDisplay').textContent = '-' + formatCurrency(posDiscount);
            }
            document.getElementById('calDisplay').textContent = cal ? `🔥 Tổng ${cal} kcal` : '';
            calcChange();
        }

        /* ── Voucher ── */
        function applyPosVoucher() {
            const code = document.getElementById('posVoucher').value.trim().toUpperCase();
            const voucher = MOCK_VOUCHERS.find(v => v.code === code && v.status === 'active');
            if (!voucher) { showToast('Mã không hợp lệ', 'error'); return; }
            const sub = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
            if (sub < voucher.minOrder) { showToast(`Cần đặt tối thiểu ${formatCurrency(voucher.minOrder)}`, 'warning'); return; }
            posDiscount = voucher.type === 'percent' ? Math.round(sub * voucher.discount / 100) : voucher.discount;
            showToast(`Voucher OK! Giảm ${formatCurrency(posDiscount)} 🎉`);
            updateTotals();
        }

        /* ── Payment ── */
        function setPayment(method) {
            paymentMethod = method;
            document.getElementById('payOnline').classList.toggle('active', method === 'online');
            document.getElementById('payCash').classList.toggle('active', method === 'cash');
            document.getElementById('cashCalc').style.display = method === 'cash' ? 'block' : 'none';
        }

        function setCash(amount) {
            document.getElementById('cashGiven').value = amount;
            calcChange();
        }

        function calcChange() {
            const given = parseFloat(document.getElementById('cashGiven').value) || 0;
            const sub = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
            const total = Math.max(0, sub - posDiscount);
            const change = Math.max(0, given - total);
            document.getElementById('changeDisplay').textContent = formatCurrency(change);
        }

        /* ── Process payment ── */
        function processPayment() {
            if (!orderItems.length) { showToast('Chưa có món nào trong đơn!', 'warning'); return; }
            if (paymentMethod === 'cash') {
                const given = parseFloat(document.getElementById('cashGiven').value) || 0;
                const sub = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
                const total = Math.max(0, sub - posDiscount);
                if (given < total) { showToast('Số tiền khách đưa chưa đủ!', 'warning'); return; }
            }
            printReceipt();
        }

        /* ── Print receipt ── */
        function printReceipt() {
            if (!orderItems.length) { showToast('Chưa có món nào!', 'warning'); return; }
            const sub = orderItems.reduce((s, i) => s + i.price * i.qty, 0);
            const total = Math.max(0, sub - posDiscount);
            const note = document.getElementById('orderNote').value;
            const given = parseFloat(document.getElementById('cashGiven').value) || 0;
            const change = Math.max(0, given - total);

            document.getElementById('receiptBody').innerHTML = `
    <div style="font-family:var(--font-mono);font-size:.82rem;border:1px dashed #e2e8f0;border-radius:var(--radius-md);padding:1.25rem">
        <div style="text-align:center;margin-bottom:.75rem">
            <div style="font-size:1.1rem;font-weight:700">🌿 GreenBite</div>
            <div style="font-size:.72rem;color:var(--gray-400)">Đơn #${orderCounter} · ${new Date().toLocaleString('vi-VN')}</div>
        </div>
        <hr style="border:1px dashed #e2e8f0;margin:.5rem 0">
        ${orderItems.map(i => `
        <div style="display:flex;justify-content:space-between;padding:.2rem 0">
            <span>${i.emoji} ${i.name} ×${i.qty}</span>
            <span>${formatCurrency(i.price * i.qty)}</span>
        </div>`).join('')}
        <hr style="border:1px dashed #e2e8f0;margin:.5rem 0">
        <div style="display:flex;justify-content:space-between"><span>Tạm tính</span><span>${formatCurrency(sub)}</span></div>
        ${posDiscount ? `<div style="display:flex;justify-content:space-between;color:var(--green-600)"><span>Giảm giá</span><span>-${formatCurrency(posDiscount)}</span></div>` : ''}
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem"><span>Tổng</span><span style="color:var(--green-700)">${formatCurrency(total)}</span></div>
        ${paymentMethod === 'cash' ? `
        <div style="display:flex;justify-content:space-between"><span>Khách đưa</span><span>${formatCurrency(given)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Tiền thừa</span><span>${formatCurrency(change)}</span></div>` : '<div>💳 Thanh toán online</div>'}
        ${note ? `<div style="margin-top:.5rem;color:var(--accent-orange);font-size:.75rem">📝 ${note}</div>` : ''}
        <hr style="border:1px dashed #e2e8f0;margin:.5rem 0">
        <div style="text-align:center;font-size:.72rem;color:var(--gray-400)">Cảm ơn quý khách! 🌱<br>GreenBite - Ăn đúng, Sống khỏe</div>
    </div>`;
            openModal('receiptModal');
        }

        function newOrder() {
            orderItems = [];
            posDiscount = 0;
            orderCounter++;
            document.getElementById('orderNumDisplay').textContent = orderCounter;
            document.getElementById('orderNote').value = '';
            document.getElementById('posVoucher').value = '';
            document.getElementById('cashGiven').value = '';
            document.getElementById('discountRow').style.display = 'none';
            renderOrder();
            renderGrid();
            showToast(`Đơn mới #${orderCounter} sẵn sàng`, 'info');
        }

        function clearOrder() {
            if (orderItems.length && !confirm('Xoá toàn bộ đơn hàng?')) return;
            newOrder();
        }

        function holdOrder() {
            showToast(`Đơn #${orderCounter} đã được giữ`, 'info');
        }

        /* ── Init ── */
        setPayment('cash');
        renderGrid();
    </script>
</body>

</html>
